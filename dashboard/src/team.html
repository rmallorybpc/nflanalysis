<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFL Team Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./team.css" />
    <style>
      .movement-cards {
        display: grid;
        gap: 0.85rem;
      }

      .movement-card {
        border-left: 4px solid #475569;
        background: rgba(8, 12, 20, 0.4);
        border-radius: 12px;
        padding: 0.85rem 0.95rem;
      }

      .movement-card.inbound {
        border-left-color: #22c55e;
      }

      .movement-card.outbound {
        border-left-color: #ef4444;
      }

      .movement-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .movement-direction {
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.05em;
      }

      .movement-direction.inbound {
        color: #22c55e;
      }

      .movement-direction.outbound {
        color: #ef4444;
      }

      .movement-badge {
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #94a3b8;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 999px;
        padding: 0.1rem 0.5rem;
      }

      .movement-player {
        margin-top: 0.35rem;
      }

      .movement-player-name {
        font-size: 1.02rem;
        font-weight: 800;
        color: #f8fafc;
      }

      .movement-position {
        margin-left: 0.45rem;
        color: #94a3b8;
        font-size: 0.74rem;
        font-weight: 700;
      }

      .movement-route,
      .movement-when,
      .movement-interval-text {
        margin-top: 0.28rem;
        color: #cbd5e1;
        font-size: 0.8rem;
      }

      .movement-route strong {
        color: #f8fafc;
      }

      .movement-mis-row {
        margin-top: 0.45rem;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
      }

      .movement-mis-label,
      .movement-interval-label {
        color: #94a3b8;
        font-size: 0.76rem;
        letter-spacing: 0.02em;
      }

      .movement-mis-value {
        font-weight: 800;
        font-size: 0.92rem;
      }

      .movement-mis-value.band-positive-strong {
        color: #22c55e;
      }

      .movement-mis-value.band-positive-light {
        color: #86efac;
      }

      .movement-mis-value.band-neutral {
        color: #cbd5e1;
      }

      .movement-mis-value.band-negative-light {
        color: #fb923c;
      }

      .movement-mis-value.band-negative-strong {
        color: #ef4444;
      }

      .movement-interval {
        margin-top: 0.42rem;
      }

      .movement-interval-svg {
        display: block;
        width: 160px;
        height: 16px;
      }

      .movement-low-confidence {
        display: inline-block;
        margin-top: 0.45rem;
        font-size: 0.65rem;
        font-weight: 800;
        letter-spacing: 0.05em;
        color: #f59e0b;
        border: 1px solid rgba(245, 158, 11, 0.45);
        border-radius: 999px;
        padding: 0.12rem 0.45rem;
      }

      .movement-footer {
        margin-top: 0.52rem;
      }

      .movement-footer a {
        color: #7dd3fc;
        font-size: 0.79rem;
        text-decoration: none;
      }

      .movement-footer a:hover,
      .movement-footer a:focus-visible {
        text-decoration: underline;
      }

      .movement-empty {
        text-align: center;
        color: #94a3b8;
        padding: 1.15rem 0.5rem;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="hero">
        <div class="hero-top">
          <p class="label">Team Detail</p>
          <nav class="top-nav" aria-label="Dashboard pages">
            <a id="overviewLink" href="./index.html?season=2024&team_id=BUF">Overview</a>
            <a href="./team.html" aria-current="page">Team Detail</a>
            <a id="scenarioLink" href="./scenario.html?season=2024&team_id=BUF">Scenario Sandbox</a>
          </nav>
        </div>
        <h1 id="title">Team --</h1>
        <p id="meta">Season --</p>
        <div class="hero-controls" aria-label="Team detail controls">
          <label>Team
            <select id="teamInput" aria-label="Team selector"></select>
          </label>
          <label>Season
            <input id="seasonInput" type="number" value="2024" min="2010" max="2100" />
          </label>
          <button id="reloadBtn" type="button">Reload Team</button>
        </div>
        <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
      </header>

      <section class="helper panel" aria-label="How to use team detail page">
        <h2>How To Use</h2>
        <p>Choose a team and season, then click Reload Team. Use the top navigation to return to overview or run a what-if in the scenario sandbox with this same context.</p>
      </section>

      <section class="cards">
        <article class="card" id="cardCurrent"></article>
        <article class="card" id="cardMoves"></article>
        <article class="card" id="cardPosition"></article>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Movement Timeline</h2>
          <div id="timeline" class="timeline"></div>
        </article>
        <article class="panel">
          <h2>MIS Trend</h2>
          <div id="trend" class="trend"></div>
        </article>
      </section>

      <section class="panel">
        <h2>Position Group Delta</h2>
        <div id="position" class="position"></div>
      </section>
    </main>

    <template id="timelineTemplate">
      <div class="timeline-item">
        <div class="timeline-week"></div>
        <div class="timeline-content"></div>
      </div>
    </template>

    <template id="trendTemplate">
      <div class="trend-row">
        <div class="trend-label"></div>
        <div class="trend-track"><div class="trend-fill"></div></div>
        <div class="trend-value"></div>
      </div>
    </template>

    <template id="positionTemplate">
      <div class="position-row">
        <div class="position-label"></div>
        <div class="position-value"></div>
      </div>
    </template>

    <script type="module" src="./team.js"></script>
  </body>
</html>
