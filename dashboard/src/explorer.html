<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFL Player Movement Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./team.css" />
    <style>
      .movement-cards {
        display: grid;
        gap: 0.85rem;
      }

      .movement-card {
        border-left: 4px solid #475569;
        background: rgba(8, 12, 20, 0.4);
        border-radius: 12px;
        padding: 0.85rem 0.95rem;
      }

      .movement-card.inbound {
        border-left-color: #22c55e;
      }

      .movement-card.outbound {
        border-left-color: #ef4444;
      }

      .movement-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.5rem;
      }

      .movement-direction {
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.05em;
      }

      .movement-direction.inbound {
        color: #22c55e;
      }

      .movement-direction.outbound {
        color: #ef4444;
      }

      .movement-badge {
        font-size: 0.66rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #94a3b8;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 999px;
        padding: 0.1rem 0.5rem;
      }

      .movement-player {
        margin-top: 0.35rem;
      }

      .movement-player-name {
        font-size: 1.02rem;
        font-weight: 800;
        color: #f8fafc;
      }

      .movement-position {
        margin-left: 0.45rem;
        color: #94a3b8;
        font-size: 0.74rem;
        font-weight: 700;
      }

      .movement-route,
      .movement-when,
      .movement-interval-text {
        margin-top: 0.28rem;
        color: #cbd5e1;
        font-size: 0.8rem;
      }

      .movement-route strong {
        color: #f8fafc;
      }

      .movement-mis-row {
        margin-top: 0.45rem;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
      }

      .movement-mis-label,
      .movement-interval-label {
        color: #94a3b8;
        font-size: 0.76rem;
        letter-spacing: 0.02em;
      }

      .movement-mis-value {
        font-weight: 800;
        font-size: 0.92rem;
      }

      .movement-mis-value.band-positive-strong {
        color: #22c55e;
      }

      .movement-mis-value.band-positive-light {
        color: #86efac;
      }

      .movement-mis-value.band-neutral {
        color: #cbd5e1;
      }

      .movement-mis-value.band-negative-light {
        color: #fb923c;
      }

      .movement-mis-value.band-negative-strong {
        color: #ef4444;
      }

      .movement-interval {
        margin-top: 0.42rem;
      }

      .movement-interval-svg {
        display: block;
        width: 160px;
        height: 16px;
      }

      .movement-low-confidence {
        display: inline-block;
        margin-top: 0.45rem;
        font-size: 0.65rem;
        font-weight: 800;
        letter-spacing: 0.05em;
        color: #f59e0b;
        border: 1px solid rgba(245, 158, 11, 0.45);
        border-radius: 999px;
        padding: 0.12rem 0.45rem;
      }

      .movement-footer {
        margin-top: 0.52rem;
      }

      .movement-footer a {
        color: #7dd3fc;
        font-size: 0.79rem;
        text-decoration: none;
      }

      .movement-footer a:hover,
      .movement-footer a:focus-visible {
        text-decoration: underline;
      }

      .movement-empty {
        text-align: center;
        color: #94a3b8;
        padding: 1.15rem 0.5rem;
      }

      #controlsRow select {
        min-width: 120px;
      }

      #loadProgress {
        margin: 0.4rem 0 0;
        min-height: 1.05rem;
        color: #d7e8f8;
        font-size: 0.82rem;
      }

      #resultsCount {
        margin: 0.6rem 0 0;
        color: #d7e8f8;
        font-size: 0.85rem;
      }

      #partialLoadNotice {
        margin: 0.35rem 0 0;
        min-height: 1.05rem;
        color: #f59e0b;
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="hero">
        <div class="hero-top">
          <p class="label">Player Movement Explorer</p>
          <nav class="top-nav" aria-label="Dashboard pages">
            <a id="overviewLink" href="./index.html?season=2026&team_id=BUF">Overview</a>
            <a id="teamLink" href="./team.html?season=2026&team_id=BUF">Team Detail</a>
            <a id="scenarioLink" href="./scenario.html?season=2026&team_id=BUF">Scenario Sandbox</a>
            <a href="./explorer.html" id="explorerLink" aria-current="page">Explorer</a>
          </nav>
        </div>
        <h1>Player Movement Explorer</h1>
        <p id="meta">Browse and filter all player movement events across seasons.</p>
        <div id="controlsRow" class="hero-controls" aria-label="Player movement explorer controls">
          <label>Season
            <select id="seasonInput" aria-label="Season selector">
              <option value="2022">2022</option>
              <option value="2023">2023</option>
              <option value="2024">2024</option>
              <option value="2025">2025</option>
              <option value="2026" selected>2026</option>
            </select>
          </label>
          <label>Team
            <select id="teamFilter" aria-label="Team filter"></select>
          </label>
          <label>Position Group
            <select id="positionFilter" aria-label="Position group filter"></select>
          </label>
          <label>Move Type
            <select id="moveTypeFilter" aria-label="Move type filter">
              <option value="">All</option>
              <option value="trade">Trade</option>
              <option value="free_agency">Free Agency</option>
            </select>
          </label>
          <label>Direction
            <select id="directionFilter" aria-label="Direction filter">
              <option value="">All</option>
              <option value="inbound">Inbound</option>
              <option value="outbound">Outbound</option>
            </select>
          </label>
          <label>Impact Band
            <select id="misBandFilter" aria-label="Impact band filter">
              <option value="">All</option>
              <option value="high_pos">High Positive</option>
              <option value="mod_pos">Moderate Positive</option>
              <option value="neutral">Neutral</option>
              <option value="mod_neg">Moderate Negative</option>
              <option value="high_neg">High Negative</option>
            </select>
          </label>
          <label>Sort
            <select id="sortInput" aria-label="Sort order">
              <option value="abs_desc" selected>Impact High→Low</option>
              <option value="abs_asc">Impact Low→High</option>
              <option value="date_desc">Date Newest</option>
              <option value="date_asc">Date Oldest</option>
            </select>
          </label>
        </div>
        <p id="resultsCount" role="status" aria-live="polite">Showing 0 of 0 movement events</p>
        <p id="loadProgress" role="status" aria-live="polite"></p>
        <div id="partialLoadNotice" role="status" aria-live="polite"></div>
        <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
      </header>

      <section class="panel">
        <h2>Movement Timeline</h2>
        <div id="explorerResults" class="timeline"></div>
      </section>
    </main>

    <script type="module" src="./explorer.js"></script>
  </body>
</html>
