name: Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pipeline-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas --break-system-packages

      - name: Validate canonical offseason CSV inputs
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          import pandas as pd

          REQUIRED_FILES = {
              "data/raw/offseason/transactions_raw_2026.csv": {
                "required_columns": [
                      "team",
                      "player",
                      "transaction_type",
                      "transaction_date",
                      "notes",
                      "source_url",
                ],
                "required_non_null_columns": [
                  "team",
                  "player",
                  "transaction_type",
                  "transaction_date",
                  "notes",
                  "source_url",
                ],
              },
              "data/raw/offseason/players_metadata_2026.csv": {
                  "required_columns": [
                      "player",
                      "position",
                      "draft_year",
                      "pfr_slug",
                      "source_url",
                ],
                "required_non_null_columns": [
                  "player",
                  "position",
                  "source_url",
                ],
              },
              "data/raw/offseason/players_metadata_2026_unresolved.csv": {
                "required_columns": ["player", "team", "reason"],
                "required_non_null_columns": ["player", "team", "reason"],
                "allow_empty_rows": True,
              },
              "data/raw/offseason/team_spending_otc_2026.csv": {
                "required_columns": ["team", "total_fa_spending"],
                "required_non_null_columns": ["team", "total_fa_spending"],
              },
              "data/raw/offseason/team_spending_otc_2026_unresolved.csv": {
                "required_columns": ["team", "reason"],
                "required_non_null_columns": ["team", "reason"],
                "allow_empty_rows": True,
              },
              "data/raw/offseason/win_totals_2026.csv": {
                "required_columns": ["team", "win_total"],
                "required_non_null_columns": ["team", "win_total"],
              },
              "data/raw/offseason/win_totals_2026_unresolved.csv": {
                "required_columns": ["team", "reason"],
                "required_non_null_columns": ["team", "reason"],
                "allow_empty_rows": True,
              },
          }

          failures = []

          def series_all_null(series: pd.Series) -> bool:
              normalized = series
              if normalized.dtype == object:
                  normalized = (
                      normalized.astype(str).str.strip().replace({"": pd.NA, "nan": pd.NA, "None": pd.NA})
                  )
              return normalized.isna().all()

          for file_path, cfg in REQUIRED_FILES.items():
              path = Path(file_path)
              file_errors = []

              if not path.exists():
                  file_errors.append("missing file")
              elif path.stat().st_size == 0:
                  file_errors.append("file is empty")

              df = None
              if not file_errors:
                  try:
                      df = pd.read_csv(path)
                  except Exception as exc:  # pylint: disable=broad-exception-caught
                      file_errors.append(f"read error: {exc}")

              required_columns = cfg["required_columns"]
              if df is not None:
                  missing_columns = [col for col in required_columns if col not in df.columns]
                  if missing_columns:
                      file_errors.append(f"missing required columns: {missing_columns}")
                  else:
                    if len(df) == 0 and cfg.get("allow_empty_rows", False):
                      pass
                    else:
                      required_non_null_columns = cfg.get("required_non_null_columns", required_columns)
                      all_null_required = [col for col in required_non_null_columns if series_all_null(df[col])]
                      if all_null_required:
                        file_errors.append(f"required columns 100% null: {all_null_required}")

              if file_errors:
                  failures.append((file_path, file_errors))
                  print(f"FAIL {file_path}: {'; '.join(file_errors)}")
              else:
                  print(f"PASS {file_path}: exists, non-empty, schema OK, required columns populated")

          if failures:
              print(f"\nValidation failed for {len(failures)} file(s).")
              sys.exit(1)

          print("\nAll canonical offseason raw input checks passed.")
          PY

  pipeline-smoke-test:
    runs-on: ubuntu-latest
    needs: validate-data
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas --break-system-packages

      - name: Run offseason pipeline smoke test
        run: |
          set -euo pipefail

          python pipelines/offseason/ingest_offseason_snapshot.py \
            --transactions data/raw/offseason/transactions_raw_2026.csv \
            --players data/raw/offseason/players_metadata_2026.csv \
            --win-totals data/raw/offseason/win_totals_2026.csv \
            --season 2026 \
            --week 1 \
            --movement-output data/processed/offseason/movement_events.csv \
            --players-output data/processed/offseason/player_dimension.csv \
            --outcomes-output data/processed/offseason/team_week_outcomes.csv \
            --review-output data/processed/offseason/manual_review.csv

          test -s data/processed/offseason/movement_events.csv
          test -s data/processed/offseason/player_dimension.csv
          test -s data/processed/offseason/team_week_outcomes.csv
          test -f data/processed/offseason/manual_review.csv

          python pipelines/offseason/build_offseason_team_features.py \
            --movement data/processed/offseason/movement_events.csv \
            --players data/processed/offseason/player_dimension.csv \
            --outcomes data/processed/offseason/team_week_outcomes.csv \
            --team-spending data/raw/offseason/team_spending_otc_2026.csv \
            --win-totals data/raw/offseason/win_totals_2026.csv \
            --output data/processed/offseason/team_week_features.csv

          test -s data/processed/offseason/team_week_features.csv

          python models/baseline/train_baseline_model.py \
            --features data/processed/offseason/team_week_features.csv \
            --outcomes data/processed/offseason/team_week_outcomes.csv \
            --output data/processed/model_outputs.csv \
            --coefficients-output models/artifacts/offseason/baseline_coefficients.csv \
            --model-version baseline-ridge-v0.2.0-offseason

          test -s data/processed/model_outputs.csv
          test -s models/artifacts/offseason/baseline_coefficients.csv

          python models/hierarchical/train_hierarchical_model.py \
            --features data/processed/offseason/team_week_features.csv \
            --outcomes data/processed/offseason/team_week_outcomes.csv \
            --movement data/processed/offseason/movement_events.csv \
            --players data/processed/offseason/player_dimension.csv \
            --output data/processed/model_outputs_hierarchical.csv \
            --effects-output models/artifacts/offseason/hierarchical_effects.csv \
            --model-version hierarchical-eb-v0.2.0-offseason

          test -s data/processed/model_outputs_hierarchical.csv
          test -s models/artifacts/offseason/hierarchical_effects.csv

  model-regression-check:
    runs-on: ubuntu-latest
    needs: pipeline-smoke-test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas --break-system-packages

      - name: Rebuild pipeline outputs
        run: |
          set -euo pipefail

          python pipelines/offseason/ingest_offseason_snapshot.py \
            --transactions data/raw/offseason/transactions_raw_2026.csv \
            --players data/raw/offseason/players_metadata_2026.csv \
            --win-totals data/raw/offseason/win_totals_2026.csv \
            --season 2026 \
            --week 1 \
            --movement-output data/processed/offseason/movement_events.csv \
            --players-output data/processed/offseason/player_dimension.csv \
            --outcomes-output data/processed/offseason/team_week_outcomes.csv \
            --review-output data/processed/offseason/manual_review.csv

          python pipelines/offseason/build_offseason_team_features.py \
            --movement data/processed/offseason/movement_events.csv \
            --players data/processed/offseason/player_dimension.csv \
            --outcomes data/processed/offseason/team_week_outcomes.csv \
            --team-spending data/raw/offseason/team_spending_otc_2026.csv \
            --win-totals data/raw/offseason/win_totals_2026.csv \
            --output data/processed/offseason/team_week_features.csv

          python models/baseline/train_baseline_model.py \
            --features data/processed/offseason/team_week_features.csv \
            --outcomes data/processed/offseason/team_week_outcomes.csv \
            --output data/processed/model_outputs.csv \
            --coefficients-output models/artifacts/offseason/baseline_coefficients.csv \
            --model-version baseline-ridge-v0.2.0-offseason

          python models/hierarchical/train_hierarchical_model.py \
            --features data/processed/offseason/team_week_features.csv \
            --outcomes data/processed/offseason/team_week_outcomes.csv \
            --movement data/processed/offseason/movement_events.csv \
            --players data/processed/offseason/player_dimension.csv \
            --output data/processed/model_outputs_hierarchical.csv \
            --effects-output models/artifacts/offseason/hierarchical_effects.csv \
            --model-version hierarchical-eb-v0.2.0-offseason

      - name: Run model regression assertions
        run: |
          python - <<'PY'
          import math
          import sys
          from pathlib import Path

          import pandas as pd

          FILES = [
              Path("data/processed/model_outputs.csv"),
              Path("data/processed/model_outputs_hierarchical.csv"),
          ]

          failures = []

          def summarize(df: pd.DataFrame, label: str) -> None:
              mis = df["mis_value"].astype(float)
              row_count = len(df)
              mean_val = float(mis.mean())
              std_val = float(mis.std(ddof=0)) if row_count > 0 else float("nan")

              coverage = math.nan
              if {"interval_90_low", "interval_90_high"}.issubset(df.columns):
                  low = pd.to_numeric(df["interval_90_low"], errors="coerce")
                  high = pd.to_numeric(df["interval_90_high"], errors="coerce")
                  coverage = float(((mis >= low) & (mis <= high)).mean())
              elif {"interval_50_low", "interval_50_high"}.issubset(df.columns):
                  low = pd.to_numeric(df["interval_50_low"], errors="coerce")
                  high = pd.to_numeric(df["interval_50_high"], errors="coerce")
                  coverage = float(((mis >= low) & (mis <= high)).mean())

              print(
                  f"SUMMARY {label}: rows={row_count}, mis_mean={mean_val:.6f}, "
                  f"mis_std={std_val:.6f}, interval_coverage_rate={coverage:.6f}"
              )

          for path in FILES:
              label = str(path)
              if not path.exists():
                  failures.append(f"{label}: missing file")
                  continue

              if path.stat().st_size == 0:
                  failures.append(f"{label}: empty file")
                  continue

              try:
                  df = pd.read_csv(path)
              except Exception as exc:  # pylint: disable=broad-exception-caught
                  failures.append(f"{label}: read error: {exc}")
                  continue

              if df.empty:
                  failures.append(f"{label}: no rows")
                  continue

              if "mis_value" not in df.columns:
                  failures.append(f"{label}: missing mis_value column")
                  continue

              mis = pd.to_numeric(df["mis_value"], errors="coerce")
              if mis.isna().any():
                  failures.append(f"{label}: mis_value contains NaN/non-numeric values")

              if (mis.abs() > 5.0).any():
                  failures.append(f"{label}: mis_value outside plausible range +/-5.0")

              for low_col, est_col, high_col in [
                  ("interval_50_low", "mis_value", "interval_50_high"),
                  ("interval_90_low", "mis_value", "interval_90_high"),
              ]:
                  if {low_col, est_col, high_col}.issubset(df.columns):
                      low = pd.to_numeric(df[low_col], errors="coerce")
                      est = pd.to_numeric(df[est_col], errors="coerce")
                      high = pd.to_numeric(df[high_col], errors="coerce")

                      if low.isna().any() or est.isna().any() or high.isna().any():
                          failures.append(f"{label}: NaN detected in {low_col}/{est_col}/{high_col}")
                      elif ((low > est) | (high < est)).any():
                          failures.append(f"{label}: interval ordering violated for {low_col}/{high_col}")

              summarize(df, label)

          if failures:
              print("FAIL model regression checks:")
              for failure in failures:
                  print(f" - {failure}")
              sys.exit(1)

          print("PASS model regression checks")
          PY