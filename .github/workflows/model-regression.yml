name: Model Regression Contract Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  model-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make check script executable
        run: chmod +x scripts/ci_check_model_regression_contract.sh

      - name: Run model regression contract checks
        run: ./scripts/ci_check_model_regression_contract.sh
