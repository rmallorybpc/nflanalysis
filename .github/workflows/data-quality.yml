name: Data Quality Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  data-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make check script executable
        run: chmod +x scripts/ci_check_data_quality.sh

      - name: Run data quality contract checks
        run: ./scripts/ci_check_data_quality.sh
