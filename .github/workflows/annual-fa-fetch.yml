name: Annual Free Agency Data Fetch

'on':
  workflow_dispatch:
    inputs:
      season:
        description: Season year (e.g. 2026)
        required: true
  schedule:
    - cron: '0 14 20 3 *'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas numpy scikit-learn --break-system-packages
      - name: Fetch and ingest
        run: |
          SEASON=${{ github.event.inputs.season || '2026' }}
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE_UTC="$(date -u +%Y.%m.%d)"
          export OFFSEASON_BASELINE_MODEL_VERSION="baseline-ridge-v${DATE_UTC}+${SHORT_SHA}-offseason"
          export OFFSEASON_HIERARCHICAL_MODEL_VERSION="hierarchical-eb-v${DATE_UTC}+${SHORT_SHA}-offseason"

          python3 scripts/fetch_season_data.py \
            --season $SEASON --force --spotrac
          python3 pipelines/offseason/ingest_offseason_snapshot.py \
            --transactions data/raw/offseason/players_metadata_${SEASON}.csv \
            --players data/raw/offseason/players_metadata_${SEASON}.csv \
            --win-totals data/raw/offseason/win_totals_${SEASON}.csv \
            --season $SEASON --week 1 --append \
            --blocklist data/raw/offseason/player_blocklist.csv
          python3 pipelines/offseason/build_offseason_team_features.py
          python3 models/hierarchical/train_hierarchical_model.py \
            --model-version "${OFFSEASON_HIERARCHICAL_MODEL_VERSION}"
          python3 pipelines/offseason/backfill_multi_season.py
          python3 scripts/build_static_payloads.py
          bash scripts/ci_check_data_quality.sh
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ models/artifacts/ dashboard/src/data/
          git diff --staged --quiet || git commit -m \
            "data(auto): annual FA fetch season=${{ github.event.inputs.season || '2026' }} [skip ci]"
          git push
