name: Dashboard Contract Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - copilot/**
  workflow_dispatch:

jobs:
  dashboard-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Make dashboard check script executable
        run: chmod +x scripts/ci_check_dashboard_contracts.sh

      - name: Run dashboard contract checks
        run: ./scripts/ci_check_dashboard_contracts.sh
